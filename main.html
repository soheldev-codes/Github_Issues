<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Isseus</title>
    <!--Tailwind Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#f8fafc] h-screen">
    <header class="">
      <nav class="bg-base-100 shadow-sm">
        <div
          class="navbar flex flex-col md:flex-row md:justify-between container mx-auto"
        >
          <div class="mb-4 md:mb-0">
            <a
              href="./main.html"
              class="text-xl cursor-pointer font-semibold flex items-center"
            >
              <img
                class="w-10 mr-2"
                src="./Images/Github.png"
                alt=""
                srcset=""
              />
              GitHub Issues Tracker</a
            >
          </div>
          <div class="gap-2">
            <input
              type="text"
              placeholder="Search Isseus..."
              class="input input-bordered outline-none w-24 md:w-auto"
            />
            <button class="btn btn-primary">New Issues</button>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <!-- Tab Section -->
      <section
        class="container mx-auto bg-white p-6 rounded-md mt-16 shadow-sm"
      >
        <div class="flex gap-2">
          <button class="btn btn-primary">All</button>
          <button class="btn">Open</button>
          <button class="btn">Closed</button>
        </div>
      </section>
    </main>
  </body>
</html>
