<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Isseus</title>
    <!--Tailwind Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#f8fafc] h-screen">
    <header class="">
      <nav class="bg-base-100 shadow-sm">
        <div
          class="navbar flex flex-col md:flex-row md:justify-between container mx-auto"
        >
          <div class="mb-4 md:mb-0">
            <a
              href="./main.html"
              class="text-xl cursor-pointer font-semibold flex items-center"
            >
              <img
                class="w-10 mr-2"
                src="./Images/Github.png"
                alt=""
                srcset=""
              />
              GitHub Issues Tracker</a
            >
          </div>
          <div class="gap-2">
            <input
              id="searchInput"
              type="text"
              placeholder="Search Isseus..."
              class="input input-bordered outline-none w-24 md:w-auto"
            />
            <button id="searchBtn" class="btn btn-primary">Search</button>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <!-- Tab Section -->
      <section
        class="container mx-auto bg-white p-6 rounded-md mt-16 shadow-sm"
      >
        <div class="flex gap-2">
          <button class="btn tab-btn btn-primary" data-status="all">All</button>
          <button class="btn tab-btn" data-status="open">Open</button>
          <button class="btn tab-btn" data-status="closed">Closed</button>
        </div>
      </section>

      <!-- Isses Section -->

      <section class="container mx-auto">
        <div>
          <!-- Issues dashbord -->
          <div
            class="bg-white p-6 mt-4 rounded-md shadow-sm flex justify-between"
          >
            <div class="flex items-center gap-2">
              <!-- Icons -->
              <div
                class="w-12 h-12 flex items-center justify-center rounded-full bg-[#ECE4FF]"
              >
                <img src="./Images/issuesIcon.png" alt="issuesicon" />
              </div>

              <div>
                <h2 class="text-2xl font-bold">
                  <span id="issuseCount"></span> Issues
                </h2>
                <p class="text-gray-500">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <div class="flex gap-4">
              <span class="flex items-center gap-2"
                ><div class="badge badge-success badge-xs"></div>
                Open</span
              >
              <span class="flex items-center gap-2"
                ><div class="badge bg-purple-500 badge-xs"></div>
                Closed</span
              >
            </div>
          </div>

          <!-- Spiner -->
          <div id="loader" class="flex justify-center items-center py-20">
            <span
              class="loading loading-spinner loading-lg text-primary"
            ></span>
          </div>

          <!-- Issues Container -->

          <div
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-4 mt-4"
            id="issuesContainer"
          ></div>

          <!-- Modal -->
          <dialog id="issueModal" class="modal">
            <div class="modal-box max-w-2xl">
              <!-- Title -->
              <h2 id="modalTitle" class="text-2xl font-bold mb-3"></h2>

              <!-- Status + Author -->
              <div class="flex items-center gap-3 text-sm text-gray-500 mb-4">
                <span
                  class="bg-green-500 text-white px-3 py-1 rounded-full text-xs font-semibold"
                >
                  Opened
                </span>

                <span>•</span>

                <span>Opened by <strong id="modalAuthor"></strong></span>

                <span>•</span>

                <span id="modalDate"></span>
              </div>

              <!-- Labels  -->
              <div id="modalLabels" class="flex gap-2 mb-4"></div>

              <!-- Description -->
              <p id="modalDescription" class="text-gray-600 mb-6"></p>

              <!-- Info Box -->
              <div
                class="bg-gray-100 rounded-lg p-4 flex justify-between items-center mb-6"
              >
                <div>
                  <p class="text-sm text-gray-500">Assignee:</p>
                  <p id="modalAssignee" class="font-semibold"></p>
                </div>

                <div>
                  <p class="text-sm text-gray-500">Priority:</p>
                  <span
                    id="modalPriority"
                    class="px-3 py-1 text-xs rounded-full bg-red-500 text-white font-semibold"
                  >
                  </span>
                </div>
              </div>

              <!-- Close Button -->
              <div class="modal-action">
                <form method="dialog">
                  <button
                    class="btn bg-purple-600 text-white hover:bg-purple-700"
                  >
                    Close
                  </button>
                </form>
              </div>
            </div>
          </dialog>
        </div>
      </section>
    </main>

    <!-- Script -->
    <script src="./Js/main.js"></script>
  </body>
</html>
